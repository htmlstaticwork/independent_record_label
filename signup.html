<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN UP | Join Solace Records</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/bootstrap-grid.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
</head>

<body class="page-fade">
    <main class="auth-fullscreen"
        style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
        <div class="container" style="max-width: 450px;">
            <div class="glass-card p-5 text-center">
                <a href="index.html" class="nav-logo mb-5" style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; white-space: nowrap; flex-wrap: nowrap;">
                    <svg class="nav-logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width: 40px; height: 40px; flex-shrink: 0;">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="2,2"/>
                        <path d="M50 20C33.4 20 20 33.4 20 50C20 66.6 33.4 80 50 80C66.6 80 80 66.6 80 50" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
                        <path d="M35 50C35 58.3 41.7 65 50 65C58.3 65 65 58.3 65 50C65 41.7 58.3 35 50 35" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
                        <circle cx="50" cy="50" r="5" fill="currentColor"/>
                    </svg>
                    SOLACE RECORDS
                </a>
                <h6 class="text-accent uppercase small letter-spacing-2 mb-2">JOIN THE REBELLION</h6>
                <h1 class="display-small uppercase mb-5">SIGN <span class="text-accent">UP</span></h1>

                <form class="text-start">
                    <div class="mb-4">
                        <input type="text" placeholder="FULL NAME" class="newsletter-input" style="padding: 15px 0;">
                    </div>
                    <div class="mb-4">
                        <input type="email" placeholder="EMAIL ADDRESS" class="newsletter-input"
                            style="padding: 15px 0;">
                    </div>
                    <div class="mb-5">
                        <input type="password" placeholder="PASSWORD" class="newsletter-input" style="padding: 15px 0;">
                    </div>
                    <div class="mb-4">
                        <label class="custom-checkbox-container" style="font-size: 0.7rem;">
                            <input type="checkbox" required>
                            <span class="checkmark" style="width: 14px; height: 14px; margin-top: 0;"></span>
                            I AGREE TERMS AND CONDITIONS
                        </label>
                    </div>
                    <button type="submit" class="btn-primary w-100 mb-4">CREATE ACCOUNT</button>

                    <div class="divider uppercase small text-secondary mb-4" style="display: flex; align-items: center; gap: 15px; font-size: 0.7rem; justify-content: center; opacity: 0.5;">
                        <span style="height: 1px; background: var(--border-color); flex: 1;"></span>
                        OR SIGN UP WITH
                        <span style="height: 1px; background: var(--border-color); flex: 1;"></span>
                    </div>

                    <div class="social-login-grid d-flex gap-4 mb-5" style="align-items: stretch; justify-content: center;">
                        <button type="button" class="btn-outline w-100 d-flex align-items-center justify-content-center gap-3" style="border-radius: 4px; padding: 12px; font-size: 0.8rem; border-color: var(--border-color); color: var(--text-primary); transition: 0.3s; background: var(--bg-surface);">
                            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"/>
                                <path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957273V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853"/>
                                <path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29V4.95818H0.957273C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957273 13.0418L3.96409 10.71Z" fill="#FBBC05"/>
                                <path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957273 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"/>
                            </svg>
                            <span style="font-weight: 500;">GOOGLE</span>
                        </button>
                        <button type="button" class="btn-outline w-100 d-flex align-items-center justify-content-center gap-3" style="border-radius: 4px; padding: 12px; font-size: 0.8rem; border-color: #1877F2; color: #1877F2; transition: 0.3s; background: var(--bg-surface);">
                            <i class="ri-facebook-fill" style="font-size: 1.25rem;"></i>
                            <span style="font-weight: 500;">FACEBOOK</span>
                        </button>
                    </div>


                    <p class="text-center small text-secondary">ALREADY HAVE AN ACCOUNT? <a href="login.html"
                            class="text-accent uppercase">LOG IN</a></p>
                </form>
            </div>
            <div class="mt-4 text-center">
                <p class="small text-secondary uppercase letter-spacing-1">Get early access to drops & exclusive digital
                    content</p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
